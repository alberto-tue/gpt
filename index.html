<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Joe GPT</title>
<style>
  :root{
    --ink:#1e2330;
    --soft:#5b6172;
    --muted:#8b90a0;
    --user-bubble:#eef0f4;
    --line:#e8eaf0;
    --composer-border:#dcdfe8;
    --send:#1e2330;
    --send-off:#cfd3dd;
    --thread:720px;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;margin:0;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;
    color:var(--ink);
    -webkit-font-smoothing:antialiased;
    background:
      radial-gradient(900px 460px at 50% -6%, #eceef4 0%, rgba(236,238,244,0) 62%),
      radial-gradient(700px 700px at 108% 112%, #f0eef7 0%, rgba(240,238,247,0) 55%),
      linear-gradient(#fbfbfd,#ffffff);
  }
  .watermark{
    position:fixed;inset:0;z-index:0;pointer-events:none;
    background-repeat:no-repeat;background-position:center 56%;background-size:440px;
    opacity:.04;
  }
  .app{position:relative;z-index:1;height:100dvh;display:flex;flex-direction:column;}

  /* Header — centered brand */
  .topbar{
    flex:0 0 auto;display:flex;align-items:center;justify-content:center;gap:14px;
    padding:24px 20px 18px;border-bottom:1px solid var(--line);
    background:rgba(255,255,255,.6);backdrop-filter:blur(6px);
  }
  .topbar img{width:42px;height:42px;object-fit:contain;}
  .brand{font-size:1.85rem;font-weight:700;letter-spacing:-.6px;color:var(--ink);line-height:1;}

  /* Chat */
  .chat{flex:1;overflow-y:auto;}
  .thread{max-width:var(--thread);margin:0 auto;padding:30px 22px 34px;
    display:flex;flex-direction:column;gap:24px;}

  .msg-row{display:flex;gap:14px;align-items:flex-start;}
  .msg-row.user{justify-content:flex-end;}
  .avatar-mini{width:30px;height:30px;flex:0 0 30px;margin-top:1px;object-fit:contain;}
  .joe-content{font-size:1.02rem;line-height:1.62;padding-top:3px;color:#2a2f3c;max-width:100%;}
  .user-bubble{background:var(--user-bubble);border-radius:20px;padding:11px 17px;
    font-size:1.02rem;line-height:1.5;max-width:70%;white-space:pre-wrap;color:var(--ink);}
  .msg-text{white-space:pre-wrap;}
  .msg-img{display:block;max-width:340px;width:100%;border-radius:14px;margin-top:10px;
    border:1px solid var(--line);}

  .typing .joe-content{display:flex;gap:5px;align-items:center;height:26px;}
  .typing .joe-content span{width:7px;height:7px;border-radius:50%;background:#b7bbc7;
    animation:blink 1.2s infinite;}
  .typing .joe-content span:nth-child(2){animation-delay:.2s;}
  .typing .joe-content span:nth-child(3){animation-delay:.4s;}
  @keyframes blink{0%,60%,100%{opacity:.3;}30%{opacity:1;}}

  /* Composer */
  .composer{padding:10px 22px 22px;
    background:linear-gradient(to top,#ffffff 62%,rgba(255,255,255,0));}
  .composer-inner{max-width:var(--thread);margin:0 auto;
    border:1px solid var(--composer-border);border-radius:27px;
    box-shadow:0 4px 18px -8px rgba(30,35,48,.18);display:flex;align-items:center;
    padding:6px 6px 6px 20px;background:#fff;}
  .composer-inner input{flex:1;border:none;outline:none;font-family:inherit;font-size:1.02rem;
    background:transparent;color:var(--ink);padding:10px 4px;}
  .composer-inner input::placeholder{color:var(--muted);}
  .send-btn{flex:0 0 36px;width:36px;height:36px;border:none;border-radius:50%;
    background:var(--send-off);cursor:pointer;display:grid;place-items:center;transition:background .15s;}
  .send-btn.on{background:var(--send);}
  .send-btn svg{width:18px;height:18px;stroke:#fff;}
  .send-btn:focus-visible{outline:2px solid var(--ink);outline-offset:2px;}

  @media (max-width:600px){
    .brand{font-size:1.55rem;}
    .topbar img{width:36px;height:36px;}
    .user-bubble{max-width:84%;}
    .thread{padding:22px 15px 26px;}
    .composer{padding:8px 14px 15px;}
  }
  @media (prefers-reduced-motion:reduce){
    .typing .joe-content span{animation:none;opacity:.5;}
  }
</style>
</head>
<body>
<div class="watermark" id="watermark"></div>
<div class="app">
  <header class="topbar">
    <img id="brandLogo" alt="Joe GPT logo">
    <span class="brand">Joe GPT</span>
  </header>

  <main class="chat" id="chat">
    <div class="thread" id="thread"></div>
  </main>

  <div class="composer">
    <form class="composer-inner" id="form" autocomplete="off">
      <input id="input" type="text" placeholder="Ask a question" aria-label="Message Joe GPT" maxlength="300">
      <button class="send-btn" id="send" type="submit" aria-label="Send">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19V5M5 12l7-7 7 7"/></svg>
      </button>
    </form>
  </div>
</div>

    const row=document.createElement('div'); row.className='msg-row user';
    const b=document.createElement('div'); b.className='user-bubble'; b.textContent=text;
    row.appendChild(b); thread.appendChild(row); scrollDown();
  }

  function joeMsg(resp){
    const row=document.createElement('div'); row.className='msg-row joe';
    const av=document.createElement('img'); av.className='avatar-mini'; av.src=LOGO; av.alt='';
    const content=document.createElement('div'); content.className='joe-content';
    if(typeof resp==='string'){ content.textContent=resp; }
    else{
      if(resp.text){ const p=document.createElement('div'); p.className='msg-text'; p.textContent=resp.text; content.appendChild(p); }
      if(resp.img){ const im=document.createElement('img'); im.className='msg-img'; im.src=resp.img; im.alt=''; im.onload=scrollDown; content.appendChild(im); }
    }
    row.appendChild(av); row.appendChild(content); thread.appendChild(row); scrollDown();
  }

  function typing(){
    const row=document.createElement('div'); row.className='msg-row joe typing';
    row.innerHTML=`<img class="avatar-mini" src="${LOGO}" alt=""><div class="joe-content"><span></span><span></span><span></span></div>`;
    thread.appendChild(row); scrollDown(); return row;
  }

  function respond(text){
    const t=typing();
    setTimeout(()=>{ t.remove(); joeMsg(reply(text)); }, 700+Math.random()*900);
  }

  input.addEventListener('input',()=>send.classList.toggle('on',input.value.trim().length>0));
  form.addEventListener('submit',function(e){
    e.preventDefault();
    const text=input.value.trim(); if(!text) return;
    userMsg(text); input.value=''; send.classList.remove('on'); respond(text);
  });

  setTimeout(()=>joeMsg("Hi, I'm Joe GPT. Go on, ask me something buddy."),300);
})();
</script>
</body>
</html>
